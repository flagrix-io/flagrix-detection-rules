version: "1.0"
category: "pdf-job-scam"
description: "Social engineering patterns common in recruitment scam PDFs"

rules:
  - id: JOB_SCAM_URGENT_ACTION
    name: Urgent Action Required
    description: Document uses urgency tactics — pressure to act quickly without thinking
    severity: medium
    pattern:
      type: text-regex
      value: "urgent.*action.*required"
      flags: [case-insensitive]
    tags: [social-engineering, urgency]

  - id: JOB_SCAM_IMMEDIATE_RESPONSE
    name: Immediate Response Demanded
    description: Document demands immediate response — pressure tactic
    severity: medium
    pattern:
      type: text-regex
      value: "immediate.*response.*needed"
      flags: [case-insensitive]
    tags: [social-engineering, urgency]

  - id: JOB_SCAM_PASSWORD_EXPIRED
    name: Password Expired Lure
    description: Fake "password expired" message — credential harvesting tactic
    severity: medium
    pattern:
      type: text-regex
      value: "password.*expired"
      flags: [case-insensitive]
    tags: [social-engineering, credential-theft, phishing]

  - id: JOB_SCAM_ACCOUNT_SUSPENDED
    name: Account Suspended Threat
    description: Fake "account suspended" message — fear tactic to capture credentials
    severity: medium
    pattern:
      type: text-regex
      value: "account.*suspended"
      flags: [case-insensitive]
    tags: [social-engineering, credential-theft, phishing]

  - id: JOB_SCAM_VERIFY_IDENTITY
    name: Identity Verification Request
    description: Immediate identity verification demand — common in KYC/onboarding scams
    severity: medium
    pattern:
      type: text-regex
      value: "verify.*identity.*immediately"
      flags: [case-insensitive]
    tags: [social-engineering, identity-theft, phishing]

  - id: JOB_SCAM_CLICK_CONFIRM
    name: Click to Confirm Request
    description: "Click here to confirm" — phishing link prompt
    severity: medium
    pattern:
      type: text-regex
      value: "click.*here.*to.*confirm"
      flags: [case-insensitive]
    tags: [social-engineering, phishing, click-bait]

risk_scoring:
  # Social engineering findings are scored cumulatively
  # A single finding = 0.3 risk, two+ findings = 0.5 risk
  single_finding_score: 0.30
  multi_finding_score: 0.50
